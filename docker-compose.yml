version: "3.8"

services:
  # ==========================================
  # MS-ESTUDIANTES
  # ==========================================
  ms-estudiantes:
    build:
      context: ./ms-estudiantes
      dockerfile: Dockerfile
    container_name: ms-estudiantes
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - academic-network

  # ==========================================
  # MS-CURSOS
  # ==========================================
  ms-cursos:
    build:
      context: ./ms-cursos
      dockerfile: Dockerfile
    container_name: ms-cursos
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8082
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - academic-network

  # ==========================================
  # MS-MATRICULAS
  # ==========================================
  ms-matriculas:
    build:
      context: ./ms-matriculas
      dockerfile: Dockerfile
    container_name: ms-matriculas
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8083
      - SERVICES_STUDENTS_URL=http://ms-estudiantes:8081
      - SERVICES_COURSES_URL=http://ms-cursos:8082
    depends_on:
      ms-estudiantes:
        condition: service_healthy
      ms-cursos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - academic-network

  # ==========================================
  # API-GATEWAY
  # ==========================================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8080
      - SERVICES_STUDENTS_URL=http://ms-estudiantes:8081
      - SERVICES_COURSES_URL=http://ms-cursos:8082
      - SERVICES_ENROLLMENTS_URL=http://ms-matriculas:8083
    depends_on:
      ms-estudiantes:
        condition: service_healthy
      ms-cursos:
        condition: service_healthy
      ms-matriculas:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - academic-network

networks:
  academic-network:
    driver: bridge
