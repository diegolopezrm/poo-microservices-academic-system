server:
  port: 8083

spring:
  application:
    name: ms-matriculas

  # H2 Database Configuration (Development)
  datasource:
    url: jdbc:h2:mem:enrollmentsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 Console (Development only)
  h2:
    console:
      enabled: true
      path: /h2-console

# Services URLs (for inter-service communication)
services:
  students:
    url: http://localhost:8081
  courses:
    url: http://localhost:8082

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging Configuration
logging:
  level:
    com.academic.matriculas: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n"
